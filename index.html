<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILAB Entertainment</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  z-index: 100;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: #38bdf8;
}

/ HERO /
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 55px;
  text-shadow: 0 0 25px #38bdf8;
}

/ SECTION /
.section {
  padding: 60px 20px;
  text-align: center;
  max-width: 1000px;
  margin: auto;
}

/ GRID /
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/ CARD /
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.4s;
  backdrop-filter: blur(8px);
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 30px #38bdf8;
}

/ 🔥 IMAGE ULTRA STYLE */
.img-wrapper {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.img-wrapper img {
  width: 100%;
  max-width: 380px;
  border-radius: 25px;
  object-fit: cover;

  box-shadow:
    0 0 25px rgba(56,189,248,0.6),
    0 0 60px rgba(147,51,234,0.4),
    0 20px 40px rgba(0,0,0,0.7);

  transition: 0.4s;
}

.img-wrapper img:hover {
  transform: scale(1.08);
  box-shadow:
    0 0 40px #38bdf8,
    0 0 90px #9333ea;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: #0ea5e9;
}

/ STATUS /
.open { color: #22c55e; font-weight: bold; }

/ FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#artists">Artists</a>
  <a href="#concerts">Concerts</a>
  <a href="#audition">Audition</a>
</nav>

<!-- HERO -->
<div class="hero">

  <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
    
    <img src="https://cdn.phototourl.com/free/2026-05-05-9e9a0f75-70d3-4eac-ad4e-f18c69994d20.png" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">

    <h1 style="margin:0;">ILAB ENTERTAINMENT</h1>

  </div>

  <p>Next Level Music Experience</p>
</div>

<!-- ARTISTS -->
<div class="section" id="artists">
  <h2>🎤 Artists</h2>

  <div class="card">
    <div class="img-wrapper">
      <img src="https://cdn.phototourl.com/free/2026-05-05-300f2ee7-6647-4b32-9027-cfe3231309da.png">
    </div>
    <h3>PLOYKRIS</h3>
    <p>Rising Star of ILAB</p>
  </div>
</div>

<!-- CONCERTS -->
<div class="section" id="concerts">
  <h2>🎫 Concerts</h2>

  <div class="card">
    <div class="img-wrapper">
      <img src="https://cdn.phototourl.com/free/2026-05-05-ceb7ad8c-e963-48e6-9503-6c93573fc72d.png">
    </div>

    <h3>THE PLOYKRIS CONCERT</h3>
    <p>9-10 May 2026</p>
    <a id="ticketBtn" class="btn" href="https://forms.gle/ABzPrd4GBBBGkPys9" target="_blank">
  🎟 BUY TICKET
</a>

<p id="statusText"></p>

<!-- AUDITION -->
<div class="section" id="audition">
  <h2>🎧 Audition</h2>

  <div class="card">
    <div class="img-wrapper">
  <img src="https://cdn.phototourl.com/free/2026-05-05-8aede61c-8da3-44c8-a105-0e1db1012740.png">
</div>
    
    <p>Join ILAB Entertainment</p>

    <a class="btn" href="https://forms.gle/dGGSYwmSu6Qgvw5j8" target="_blank">
      APPLY NOW
    </a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © ILAB Entertainment
</footer>

  <script>
let statusState = 0; // 0=Coming Soon, 1=Open, 2=Sold Out

const btn = document.getElementById("ticketBtn");
const status = document.getElementById("statusText");

if (statusState === 0) {
  btn.innerHTML = "⏳ COMING SOON";
  btn.style.pointerEvents = "none";
  btn.style.opacity = "0.5";

  status.innerHTML = "ยังไม่เปิดขายบัตร";
  status.style.color = "#fbbf24";
}

else if (statusState === 1) {
  btn.innerHTML = "🎟 BUY TICKET";
  btn.style.pointerEvents = "auto";
  btn.style.opacity = "1";

  status.innerHTML = "🟢 เปิดขายแล้ว";
  status.style.color = "#22c55e";
}

else if (statusState === 2) {
  btn.innerHTML = "❌ SOLD OUT";
  btn.style.pointerEvents = "none";
  btn.style.opacity = "0.5";

  status.innerHTML = "บัตรขายหมดแล้ว";
  status.style.color = "#ef4444";
}
</script>

</body>
</html>
