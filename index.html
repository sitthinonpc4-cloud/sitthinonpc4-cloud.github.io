<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILAB Entertainment</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  color: white;
  background: black;
  overflow-x: hidden;
}

/* 🔥 animated background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 20%, #1d4ed8, transparent),
              radial-gradient(circle at 80% 80%, #9333ea, transparent),
              black;
  animation: moveBg 10s infinite alternate;
  z-index: -1;
}

@keyframes moveBg {
  from { filter: blur(0px); transform: scale(1); }
  to { filter: blur(20px); transform: scale(1.1); }
}

/ NAV /
nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: #38bdf8;
}

/ HERO /
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 60px;
  text-shadow: 0 0 20px #38bdf8;
}

/ SECTION /
.section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

/ GRID /
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/ CARD 3D /
.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 20px;
  transition: 0.4s;
  transform-style: preserve-3d;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card:hover {
  transform: rotateY(10deg) rotateX(10deg) scale(1.05);
  box-shadow: 0 0 30px #38bdf8;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

/ BUTTON /
.btn {
  display: inline-block;
  padding: 10px 15px;
  margin-top: 10px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: #0ea5e9;
}

/ REVEAL /
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.reveal.show {
  opacity: 1;
  transform: translateY(0);
}

/ FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<nav>
  <a href="#artists">Artists</a>
  <a href="#concerts">Concerts</a>
  <a href="#audition">Audition</a>
</nav>

<div class="hero">
  <h1>ILAB ENTERTAINMENT</h1>
  <p>Next Level Music Experience</p>
</div>

<div class="section reveal" id="artists">
  <h2>🎤 Artists</h2>
  <div class="grid">
    <div class="card">
      <img src="https://cdn.phototourl.com/free/2026-05-05-300f2ee7-6647-4b32-9027-cfe3231309da.png">
      <h3>PLOYKRIS</h3>
      <p>Rising Star</p>
    </div>
  </div>
</div>

<div class="section reveal" id="concerts">
  <h2>🎫 Concerts</h2>

  <div class="grid">
    <div class="card">
      <img src="https://cdn.phototourl.com/free/2026-05-05-ceb7ad8c-e963-48e6-9503-6c93573fc72d.png">
      <h3>THE PLOYKRIS CONCERT</h3>
      <p>9-10 May 2026</p>

      <a class="btn" href="https://forms.gle/ABzPrd4GBBBGkPys9" target="_blank">
        🎟 BUY TICKET
      </a>
    </div>
</div>
</div>

<div class="section reveal" id="audition">
  <h2>🎧 Audition</h2>

  <div class="card">
    <p>Join ILAB Entertainment</p>

    <a class="btn" href="https://forms.gle/dGGSYwmSu6Qgvw5j8" target="_blank">
      APPLY NOW
    </a>
  </div>
</div>

<footer>
  © ILAB Entertainment
</footer>

<script>
// reveal animation
const items = document.querySelectorAll(".reveal");

window.addEventListener("scroll", () => {
  items.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
