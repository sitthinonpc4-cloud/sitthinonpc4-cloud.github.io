<!DOCTYPE html>
<html>
<head>
  <title>ILAB Entertainment</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 50px 20px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      margin: 0;
      font-size: 45px;
    }

    / SECTION /
    .section {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .section h2 {
      border-left: 5px solid #38bdf8;
      padding-left: 10px;
    }

    / CARD /
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 15px;
      margin: 15px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      border-radius: 10px;
      max-width: 100%;
    }

    / BUTTON /
    .btn {
      display: inline-block;
      padding: 10px 15px;
      margin-top: 10px;
      background: #38bdf8;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    / STATUS /
    .open {
      color: #22c55e;
      font-weight: bold;
    }

    .closed {
      color: #ef4444;
      font-weight: bold;
    }

    / FOOTER */
    .footer {
      text-align: center;
      padding: 15px;
      background: black;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<!-- 🔝 Header -->
<div class="header">
  <h1>🎤 ILAB Entertainment</h1>
  <p>ค่ายดนตรีของเรา</p>
</div>

<!-- 🎤 ศิลปิน -->
<div class="section">
  <h2>👤 ศิลปิน</h2>

  <div class="card">
    <img src="https://cdn.phototourl.com/free/2026-05-05-150bafe7-1cbb-4c08-b119-6b8705f2df33.png">
    <h3>PLOYKRIS พลอยคริส วรันทรศ์ กิจติเจริญ</h3>
    <p>ศิลปินหญิงเดี่ยวคนแรกของค่ายเรา</p>
  </div>
</div>

<!-- 🎫 คอนเสิร์ต -->
<div class="section">
  <h2>🎫 งาน / คอนเสิร์ต</h2>

  <div class="card">
    <img src="https://cdn.phototourl.com/free/2026-05-05-ceb7ad8c-e963-48e6-9503-6c93573fc72d.png">
    <h3>THE PLOYKRIS CONCERT</h3>
    <p>9-10 May 2026</p>

    <a class="btn" href="https://forms.gle/ABzPrd4GBBBGkPys9" target="_blank">
      🎟 ซื้อตั๋ว
    </a>

    <p class="open">✅ เปิดขาย</p>
  </div>
</div>

<!-- 🎧 ออดิชั่น -->
<div class="section">
  <h2>🎧 ออดิชั่น</h2>

  <div class="card">
    <p>อยากเป็นศิลปินกับเรา?</p>

    <a class="btn" href="https://forms.gle/dGGSYwmSu6Qgvw5j8" target="_blank">
      สมัครออดิชั่น
    </a>

    <p id="status"></p>
  </div>
</div>

<!-- 🔚 Footer -->
<div class="footer">
  <p>© ILAB Entertainment</p>
</div>

<!-- 🧠 Script (แก้บั๊กแล้ว) -->
<script>
let isOpen = true;

let status = document.getElementById("status");

if (isOpen) {
  status.innerHTML = "✅ เปิดรับสมัคร";
  status.className = "open";
} else {
  status.innerHTML = "❌ ปิดรับสมัครแล้ว";
  status.className = "closed";
}
</script>

</body>
</html>
