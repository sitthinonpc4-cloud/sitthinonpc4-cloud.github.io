<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product | ILAB Shop</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
     NAVBAR
========================= -->

<nav>

  <div class="logo">

    <img src="https://cdn.phototourl.com/free/2026-05-10-b2ce4dcc-4eb4-41f1-8ac5-7070ee5ed345.png">

    <h1>ILAB Entertainment</h1>

  </div>

  <ul>

    <li><a href="shop.html">← Back to Shop</a></li>

  </ul>

</nav>

<!-- =========================
     PRODUCT PAGE
========================= -->

<section class="section">

  <div class="product-page">

    <!-- LEFT -->
    <div class="product-left">

      <!-- รูปหลัก -->
      <img
      id="productImage"
      class="main-product-image"
      src="">

      <!-- รูปเล็ก -->
      <div
      class="product-thumbnails"
      id="productThumbnails">

      </div>

    </div>

    <!-- RIGHT -->
    <div class="product-right">

      <!-- ศิลปิน -->
      <h3 id="productArtist"></h3>

      <!-- ชื่อสินค้า -->
      <h1 id="productName"></h1>

      <!-- ราคา -->
      <h2 id="productPrice"></h2>

      <!-- รายละเอียด -->
      <p id="productDesc"></p>

      <!-- SIZE -->
      <div class="size-box">

        <h3>Size</h3>

        <select id="sizeSelect">

        </select>

      </div>

      <!-- BUTTON -->
      <button
      class="btn"
      id="productBtn">

        BUY NOW

      </button>

    </div>

  </div>

</section>

<!-- =========================
     FOOTER
========================= -->

<footer>

  © ILAB Entertainment

</footer>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
